version: 2
updates:
  # Keep GitHub Actions pinned versions current (checkout, setup-python, ...)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

  # Python dependencies (pyproject.toml + requirements.txt).
  # Ranges are floors (>=), so PRs arrive only when a floor is stale or
  # a security advisory affects a dependency.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    groups:
      python-deps:
        patterns: ["*"]
