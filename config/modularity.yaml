# Modularity & structure: clamshell split, semi-monocoque frame, and
# joint hardware (ADR-0010, superseding ADR-0008's transverse splits).
# Used by fuselage_design.py and the CAD assembly.
#
# Architecture (external review, C. Ucler 2026-07-09): the fuselage is a
# LONGITUDINAL clamshell -- a structural lower half and a full-length
# hinged upper lid (hinge one side, latch the other) for interior access.
# A rectangular Alu/CFRP profile runs around the joint line and works as
# the LONGERONS (a "picture frame" in plan view); crossbeams between the
# longerons are universal equipment mounts (camera bolts to the frame --
# no separate nose module); the battery rail sits on the lower centerline
# and is tied to the frame by 2 half-rings that double as longeron<->
# frame connections and vibration paths. The skin is a thin covering
# (semi-monocoque), NOT the primary load path -- lighter than the
# load-bearing monocoque cylinder it replaces.
#
# Split lines that remain: the clamshell (below) and the two-piece WING
# on the CFRP carry-through spar (unchanged from ADR-0008).
#
# Frame/skin member masses are COMPUTED from the geometry below (profile
# section area x length x rho; skin t x S_wet x rho), never configured.
# Discrete joint hardware (hinge/latch) is carved from the structural
# fraction as named hardware (ADR-0005 discipline).
#
# --- Clamshell --------------------------------------------------------
# clam_aft_frac       : clamshell region runs from the nose tip to
#                       clam_aft_frac * L_fus [-]. 0.70 = the start of
#                       the tail cone (f_tail = 0.30): the boattail is
#                       the fan centerbody and stays one piece with the
#                       lower half.
#
# lid_hinge_mass_kg   : piano-hinge strip along one longeron, full lid
#                       length (~0.36 m of light Alu/printed hinge).
#
# lid_latch_mass_kg   : 2x quarter-turn latches on the opposite longeron
#                       + local reinforcement.
#
# --- Longeron frame (semi-monocoque) ----------------------------------
# frame_profile_side_m : square box-profile outer side [m]. 8 mm suits
#                       the ~102 mm body and matches common stock.
# frame_profile_wall_m : profile wall [m] (1 mm stock Alu / pultruded).
#                       Linear density = section area x rho, COMPUTED.
#
# frame_material      : which rho_frame entry sizes the frame.
#   alu            : 6061-class extrusion -- cheap, bondable, first
#                    iterations with the FDM skin.
#   cfrp_pultruded : pultruded carbon box -- the "2-ply carbon" endpoint.
#
# n_crossbeams        : transverse beams between the side longerons
#                       (equipment mounts). 3 covers payload / avionics /
#                       battery stations.
#
# n_half_rings        : half-rings tying the battery rail to the frame
#                       in the lower shell; they stabilize the shell
#                       (classic semi-monocoque frames) and carry the
#                       longeron<->rail vibration path.
#
# --- Skin (per construction method) -----------------------------------
# skin                : thickness + density per construction method.
#   segmented_fdm : printed shell halves, ~1.2 mm walls at PETG-class
#                   density -- buildable NOW; heavier than carbon.
#   cfrp_2ply     : 2 cured plies (~0.25 mm each) at laminate density --
#                   the mass-target endpoint ("2 kat karbonla biter"),
#                   laid over a printed mold.
#
# k_skin              : bonding/overlap allowance on the skin only [-].
#                       1.05 replaces the old monocoque k_struct = 1.30:
#                       that factor hid the frames -- they are explicit
#                       members now, so only seams/overlap remain.
#
# --- Wing spar / two-piece wing (unchanged, ADR-0008) -----------------
# spar_od_m           : CFRP tube OD [m] (= wing_lighten --spar-hole).
# spar_wall_m         : tube wall [m].
# spar_span_frac      : spar length / wing span [-].
# spar_chord_frac     : spar chordwise station / wing chord [-]
#                       (= wing_lighten --webs first entry).
# rho_spar            : CFRP tube density [kg/m^3]. Spar mass computed.
# wing_root_fitting_mass_kg : per-side printed root socket + screw.

clam_aft_frac: 0.70
lid_hinge_mass_kg: 0.012
lid_latch_mass_kg: 0.008

frame_profile_side_m: 0.008
frame_profile_wall_m: 0.001
frame_material: alu
rho_frame:
  alu: 2700.0
  cfrp_pultruded: 1600.0
n_crossbeams: 3
n_half_rings: 2

skin:
  segmented_fdm:
    t_skin_m: 0.0012
    rho_skin: 1240.0
  cfrp_2ply:
    t_skin_m: 0.0005
    rho_skin: 1600.0
k_skin: 1.05

spar_od_m: 0.008
spar_wall_m: 0.001
spar_span_frac: 0.6
spar_chord_frac: 0.30
rho_spar: 1600.0
wing_root_fitting_mass_kg: 0.006
