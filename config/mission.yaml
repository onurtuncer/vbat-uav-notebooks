# Mission profile for the electric V-BAT-like tail-sitter (COTS 195 mm EDF).
#
# Total mission = t_hover + t_transition + t_cruise
#              = 120 + 40 + 900 s = 17.7 min   (target band: 15-20 min)
#
# Sized for the 195 mm COTS EDF decision (2026-07 design review): the
# high disk loading (~800 N/m^2 at ~2.5 kg) makes hover expensive, so
# the mission is deliberately short-hover, cruise-dominated.
#
# t_hover       : total vertical-flight time budget [s]
#                 60 s takeoff hover + 60 s landing hover, with margin
# t_transition  : total transition budget, both directions [s]
#                 2 x 20 s, energetically billed at hover power
# t_cruise      : forward cruise time [s]
#                 15 min at 20 m/s = 18 km range
# V_cruise      : cruise airspeed [m/s]
# rate_of_climb : VTOL vertical rate of climb [m/s]
# reserve_factor: energy reserve multiplier (1.20 = +20%)
# payload_kg    : mission payload requirement [kg]

t_hover: 120.0
t_transition: 40.0
t_cruise: 900.0
V_cruise: 20.0
rate_of_climb: 2.5
reserve_factor: 1.20
payload_kg: 0.5

# ── Mission-profile decomposition (NB16 timeline + battery track) ──────────────
# The hover budget above is split into the two vertical legs the vehicle
# actually flies, so the design-summary notebook can draw the altitude/time
# profile and track pack state-of-charge leg-by-leg.  These are a presentation
# decomposition ONLY: they do not enter the mass closure (which bills the whole
# t_hover + t_transition at hover power regardless of the split), and
# mission_profile.py asserts t_hover_takeoff + t_hover_landing == t_hover.
#
# h_cruise        : nominal cruise / patrol altitude AGL [m]
#                   The vertical takeoff leg climbs to this altitude at
#                   rate_of_climb (climb time = h_cruise / rate_of_climb),
#                   then station-keeps for the remainder of the takeoff budget;
#                   the landing leg descends it back to the ground.  120 m keeps
#                   the climb (~48 s at 2.5 m/s) inside the 60 s takeoff budget
#                   and sits well under the 3000 m service ceiling.
# t_hover_takeoff : vertical takeoff climb + stabilisation hover [s]
# t_hover_landing : vertical descent + landing hover [s]
h_cruise: 120.0
t_hover_takeoff: 60.0
t_hover_landing: 60.0
