# Aerodynamic parameters for the V-BAT tail-sitter sizing study.
#
# These are first-order estimates appropriate for early conceptual design.
# Update them as geometry is refined in the preliminary design phase.
#
# LD        : cruise lift-to-drag ratio [-]
#             8.0 is a conservative estimate for a clean small fixed-wing UAV.
#             Well-optimised designs can achieve 10–12.
#
# CD0       : zero-lift drag coefficient [-]
#             0.025 is typical for a smooth CFRP fuselage + thin wing.
#             Includes fuselage, wing interference, and EDF nacelle.
#
# AR        : wing aspect ratio [-]
#             6.0 balances induced drag reduction against structural mass.
#             Higher AR improves cruise efficiency but increases wing bending loads.
#
# e         : Oswald span efficiency factor [-]
#             0.80 is representative for a straight, unswept, untapered wing.
#
# CL_max    : maximum lift coefficient (3D wing) [-]
#             1.2186 = the selected NACA 2412 wing's CL_max_3D from the
#             NB2 airfoil selection (Raymer 3-8: 0.9 x Cl_max_2D 1.354,
#             unswept). The former 1.4 was a pre-selection "NACA 00xx"
#             placeholder; the 2026-07 external aero review (C. Ucler)
#             showed the stall line computed from it (11.98 m/s) was
#             inconsistent with the selected airfoil (true ~12.8 m/s at
#             the old wing loading). This value MUST track the NB2
#             selection: change the airfoil -> update CL_max here in the
#             same commit (the regression pins catch drift). Note the
#             wing sits at Re ~ 1.4e5 near stall, where CL_max erodes
#             with roughness/transition -- the stall-limited wing sizing
#             this value drives is the margin against that.
#
# V_stall   : required stall speed [m/s]
#             12.0 m/s bounds the transition envelope (wing-borne at
#             V_To = 1.2 x V_stall) and keeps V_cruise/V_stall = 1.67
#             gust margin; drives the wing area via
#             (W/S)_stall = 0.5*rho*V_stall^2*CL_max.
#
# V_max     : maximum airspeed [m/s]
#             35.0 m/s is the regulatory ceiling for the open category.
#
# ddot_min_deg_s2 : minimum required angular acceleration about any axis
#             [deg/s^2]. 30 deg/s^2 is a soft conceptual-stage floor for
#             adequate handling response. Shared by control_vane_design
#             (hover/transition, jet vanes) and aileron_design (cruise,
#             wing control surfaces) so both notebooks check against the
#             same requirement.

LD: 8.0
CD0: 0.025
AR: 6.0
e: 0.80
CL_max: 1.2186
V_stall: 12.0
V_max: 35.0
ddot_min_deg_s2: 30.0