# Battery-pack candidates (see selection.yaml for policy/format).
# The sizing loop sizes the battery by ENERGY (mass closure); this
# category maps that sized point onto real packs: s_cells must equal
# the configured series bus, capacity_mah >= the sized mission capacity
# (pack_capacity_ah, ~3.5 Ah at the current design point -- already
# includes the config/battery.yaml DoD reserve), and the continuous
# discharge current (c_rate_cont * capacity) must cover the ESC's
# margined hover current. Capacity is quantised in the COTS catalog, so
# the winning pack lands slightly HEAVIER than the sized battery mass
# -- reported against m_battery_kg as a budget line, never filtered on.
# ratings: capacity_mah [mAh], s_cells [-] (exact match), c_rate_cont
# [1/h] continuous discharge C-rating. Box primitive: dims_mm = [L,W,H].
#
# TR sourcing: 6S packs in the 4-5 Ah class are stock items at Turkish
# hobby retailers (robotus, oyuncakhobi, robolinkmarket); mind that
# stock rotates quickly -- re-check the url at procurement.

batteries:
  - id: gens_ace_6s_4000_30c
    name: Gens Ace 4000 mAh 6S 30C LiPo
    mass_g: 613.0           # retailer-listed pack mass (robotus.net)
    dims_mm: [137.0, 43.0, 40.0]   # EST envelope -- verify at procurement
    shape: box
    capacity_mah: 4000.0
    s_cells: 6
    c_rate_cont: 30.0
    url: https://www.robotus.net/gens-ace-4000mah-222v-30c-6s-lipo-batarya-lipo-pil
