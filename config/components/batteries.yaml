# Battery-pack candidates (see selection.yaml for policy/format).
# The sizing loop sizes the battery by ENERGY (mass closure); this
# category maps that sized point onto real packs: s_cells must equal
# the configured series bus, capacity_mah >= the sized mission capacity
# (pack_capacity_ah, ~3.5 Ah at the current design point -- already
# includes the config/battery.yaml DoD reserve), and the continuous
# discharge current (c_rate_cont * capacity) must cover the ESC's
# margined hover current. Capacity is quantised in the COTS catalog, so
# the winning pack lands slightly HEAVIER than the sized battery mass
# -- reported against m_battery_kg as a budget line, never filtered on.
# ratings: capacity_mah [mAh], s_cells [-] (exact match), c_rate_cont
# [1/h] continuous discharge C-rating. Box primitive: dims_mm = [L,W,H].
#
# TR sourcing: 6S packs in the 4-5 Ah class are stock items at Turkish
# hobby retailers (robotus, oyuncakhobi, robolinkmarket); mind that
# stock rotates quickly -- re-check the url at procurement.
#
# Li-ion cylindrical packs (21700 cells) are a second pack class: ~40%
# better pack-level specific energy than the LiPo bricks (108 Wh at
# 450 g vs 88.8 Wh at 613 g for the Gens Ace), at the cost of a lower
# C-rating -- viable here only because the P50B is a high-power cell
# (60 A cont) whose 1P current still clears the ESC's margined hover
# draw. Note the chemistry nominal is 3.6 V/cell vs the 3.7 V/cell in
# config/electrical.yaml (21.6 V vs 22.2 V bus) -- a ~3% bus-voltage
# overestimate in the wiring/current laws, acceptable at this margin
# but worth revisiting if a Li-ion pack is frozen at procurement.

batteries:
  - id: molicel_p50b_6s1p_5000
    name: Molicel P50B 6S1P 5000 mAh Li-ion (21700)
    mass_g: 450.0           # vendor-listed built-pack mass (wrekd.com)
    dims_mm: [139.0, 25.0, 72.0]   # single-row 6-cell stick (wrekd.com)
    shape: box
    capacity_mah: 5000.0
    s_cells: 6
    c_rate_cont: 12.0       # = the P50B cell's 60 A continuous datasheet
                            # rating: a 1P stick's continuous limit is the
                            # cell's, provided the build uses adequate
                            # busbars (copper-sandwich / thick nickel --
                            # spec this for the local spot-weld build).
                            # Was 10.0 (a self-imposed 50 A derate) until
                            # the ADR-0014 amendment's honest IR
                            # accounting pushed the margined ESC current
                            # to ~54 A; the actual mission draw is ~33 A
                            # (6.7C) -- the 1.6x ESC margin is the
                            # conservative part, not the pack.
    # No TR-stocked built pack found (2026-07): built 6S1P packs are
    # import (wrekd.com, nexusbatterysystems.com, upgradeenergytech.com,
    # danenergy.com). Bare P50B cells ARE TR-stocked (elektrodepo.com,
    # pilburada.com, trendyol, hepsiburada; pilpaketi.com listed but out
    # of stock) -- a local spot-welded 6S1P build is the in-country route.
    url: https://wrekd.com/products/6s1p-21-6v-molicel-p50b-5000mah-li-ion-battery-pack
