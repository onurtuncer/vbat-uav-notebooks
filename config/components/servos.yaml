# Servo candidates -- jet vanes + ailerons, one type for all 6
# (see selection.yaml for policy/format).
# ratings: stall_torque_gcm at torque_at_v <= the 5 V BEC2 rail
# (conservative: the catalog point nearest BELOW the rail voltage).

servos:
  - id: kst_x08_v6
    name: KST X08 V6 (metal gear, digital)
    mass_g: 8.9             # vendor datasheet
    dims_mm: [23.5, 8.0, 16.8]
    shape: box
    stall_torque_gcm: 1400.0   # at 4.2 V (2200 g-cm at 6 V)
    torque_at_v: 4.2
    # no TR source found at catalog review (2026-07) -- import (KST
    # direct / EU glider shops). TR-stocked alternatives below are
    # ~3 g heavier each (x6 installed = ~18 g on the vehicle).
  - id: sg90
    name: TowerPro SG90 (plastic gear, analog)
    mass_g: 9.0             # vendor datasheet
    dims_mm: [22.2, 11.8, 31.0]
    shape: box
    stall_torque_gcm: 1800.0   # at 4.8 V
    torque_at_v: 4.8
    # plastic gears -- fine for bench work, weak for a flight article
    # holding against jet-vane flutter loads; prefer metal-gear parts.
    url: https://www.robotistan.com/tower-pro-sg90-rc-mini-servo-motor-eng
  - id: mg90s
    name: TowerPro MG90S (metal gear)
    mass_g: 12.2            # vendor datasheet (bare, no horn/lead)
    dims_mm: [22.8, 12.2, 28.5]
    shape: box
    stall_torque_gcm: 2000.0   # at 4.8 V
    torque_at_v: 4.8
    url: https://www.robotistan.com/mg90s-servo-motor-en
  - id: emax_es08ma2
    name: EMAX ES08MA II (metal gear, analog)
    mass_g: 12.0            # vendor datasheet
    dims_mm: [23.0, 11.5, 24.0]
    shape: box
    stall_torque_gcm: 1600.0   # at 4.8 V
    torque_at_v: 4.8
    # also stocked TR-wide (motorobit, promodelhobby, ihahobi).
    url: https://www.robotistan.com/emax-es08ma-ii-12g-mini-metal-gear-analog-servo-for-rc-model-and-robot-pwm-servo
