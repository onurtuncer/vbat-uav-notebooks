# ESC candidates (see selection.yaml for policy/format).
# ratings: i_cont_a [A], s_min/s_max [cells], telemetry [bool] =
# streams RPM/current (datalog-only does NOT count).

escs:
  - id: apd_80f3x
    name: APD 80F3[X] (KISS/serial telemetry)
    mass_g: 30.0            # EST incl. power leads (~19.5 g board-only per vendor)
    dims_mm: [58.0, 25.0, 12.0]
    shape: box
    i_cont_a: 80.0
    s_min: 2
    s_max: 8
    telemetry: true
