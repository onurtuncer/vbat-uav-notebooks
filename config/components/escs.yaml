# ESC candidates (see selection.yaml for policy/format).
# ratings: i_cont_a [A], s_min/s_max [cells], telemetry [bool] =
# streams RPM/current (datalog-only does NOT count). url: TR retailer
# where one exists (see selection.yaml PROCUREMENT URLS).
#
# HONEST TR-SOURCING NOTE (2026-07): no Turkish retailer stocked a
# single-channel 50 A+ ESC with LIVE telemetry at catalog review -- the
# telemetry-capable parts (APD, Tekko32) are import-only, and the
# TR-stocked 60-80 A parts (ALPHA, FlyFun) are datalog-only or dumb.
# The rejected-but-TR-stocked entries below document that gap.

escs:
  - id: apd_80f3x
    name: APD 80F3[X] (KISS/serial telemetry)
    mass_g: 30.0            # EST incl. power leads (~19.5 g board-only per vendor)
    dims_mm: [58.0, 25.0, 12.0]
    shape: box
    i_cont_a: 80.0
    s_min: 2
    s_max: 8
    telemetry: true
    # no TR source found at catalog review -- import (vendor or EU
    # resellers). TR alternative requires waiving the telemetry
    # requirement (ADR-0011) or a datalog-only compromise.
  - id: hobbywing_flyfun_80a_v5
    name: Hobbywing FlyFun 80A V5
    mass_g: 92.0            # vendor datasheet
    dims_mm: [75.0, 32.0, 16.0]
    shape: box
    i_cont_a: 80.0
    s_min: 3
    s_max: 6
    telemetry: false        # onboard datalog only, no live stream
    # TR: kalyonmodel stocks the HV sibling (see flyfun_80a_hv below);
    # the 3-6S V5 itself was not listed at catalog review.
  - id: hobbywing_flyfun_80a_hv
    name: Hobbywing FlyFun 80A-HV (EST)
    mass_g: 97.0            # EST -- verify at procurement
    dims_mm: [78.5, 35.0, 16.0]
    shape: box
    i_cont_a: 80.0
    s_min: 5
    s_max: 8
    telemetry: false        # datalog only
    url: https://www.kalyonmodel.com/urun/esc-ucak-2-12s-80a
  - id: hobbywing_platinum_60a_v4
    name: Hobbywing Platinum 60A V4 (7 A BEC)
    mass_g: 49.0            # vendor datasheet
    dims_mm: [63.0, 30.0, 14.0]
    shape: box
    i_cont_a: 60.0
    s_min: 3
    s_max: 6
    telemetry: false
  - id: tmotor_alpha_60a_lv
    name: T-Motor ALPHA 60A LV
    mass_g: 74.0            # EST (vendor class)
    dims_mm: [69.0, 33.0, 17.0]
    shape: box
    i_cont_a: 60.0
    s_min: 3
    s_max: 6
    telemetry: false
    url: https://www.oyuncakhobi.com/t-motor-alpha-60a-lv-esc-vtol-drone-multirotor-brushless-motor-esc-4-6s-500-hz
  - id: holybro_tekko32_65a
    name: Holybro Tekko32 F4 Metal 65A (DShot telemetry)
    mass_g: 34.0            # EST incl. leads
    dims_mm: [42.0, 38.0, 8.0]
    shape: box
    i_cont_a: 65.0
    s_min: 3
    s_max: 6
    telemetry: true
    # no TR source found at catalog review; drone.net.tr (Holybro TR
    # distributor) can order-in.
