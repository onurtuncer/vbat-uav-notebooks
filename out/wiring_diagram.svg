    <circle cx="640" cy="745" r="3.4"/>
    <circle cx="70" cy="745" r="3.4"/><circle cx="230" cy="745" r="3.4"/>
    <circle cx="390" cy="745" r="3.4"/><circle cx="550" cy="745" r="3.4"/>
    <circle cx="710" cy="745" r="3.4"/><circle cx="870" cy="745" r="3.4"/>
